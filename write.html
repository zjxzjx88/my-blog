<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>写作发布 - 个人 Blog</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: url('./005GezDWgy1huhy5znorij33b04eob2e.jpg') no-repeat center center fixed;
            background-size: cover;
            /* 添加方正舒体字体和白色文字颜色 */
            font-family: "方正舒体", "STKaiti", "KaiTi", serif;
            color: #ffffff;
        }

        .ink-bg {
            background: rgba(255, 255, 255, 0.096);
            border-radius: 1.5rem;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            border: 1px solid #e5e7eb;
        }

        .ink-title {
            font-family: "方正舒体", "STKaiti", "KaiTi", serif;
            /* 更新标题字体 */
            letter-spacing: 0.1em;
            color: #ffffff;
            /* 将标题颜色改为白色 */
            text-shadow: 0 2px 8px #000000;
            /* 调整阴影以突出白色文字 */
        }

        .ink-btn {
            transition: background 0.2s, box-shadow 0.2s;
        }

        .ink-btn:hover {
            background: #e0e7ef;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.10);
        }

        .form-input,
        .form-textarea {
            border-radius: 0.75rem;
            border: 1px solid #e5e7eb;
            background: #f9fafb59;
            padding: 0.75rem 1rem;
            width: 100%;
            font-size: 1rem;
            margin-bottom: 1rem;
            outline: none;
            transition: border 0.2s;
            color: #333;
            /* 确保输入框内的文字颜色可见 */
        }

        .form-input:focus,
        .form-textarea:focus {
            border-color: #60a5fa;
        }

        /* 覆盖 Tailwind 的文字颜色类，使其更亮 */
        .text-gray-700 {
            color: #cccccc !important;
        }

        .text-green-600 {
            color: #9ae6b4 !important;
            /* 调整成功提示颜色 */
        }
    </style>
    <script>
        function showSuccess() {
            document.getElementById('success-tip').classList.remove('hidden');
            setTimeout(function () {
                document.getElementById('success-tip').classList.add('hidden');
            }, 1800);
        }
    </script>
</head>

<body class="min-h-screen flex flex-col items-center py-8">
    <!-- 顶部返回与标题 -->
    <div class="flex items-center w-full max-w-xl mb-6">
        <a href="index.html" class="text-gray-500 hover:text-blue-500 mr-4"><i class="fa-solid fa-chevron-left"></i>
            返回</a>
        <h2 class="text-2xl font-bold ink-title flex-1 text-center">写作发布</h2>
        <span class="w-12"></span>
    </div>
    <!-- 写作表单区块 -->
    <div class="ink-bg w-full max-w-xl p-6">
        <form onsubmit="showSuccess();return false;">
            <label class="block mb-2 text-gray-700 font-semibold">文章标题</label>
            <input type="text" class="form-input" placeholder="请输入标题" required>
            <label class="block mb-2 text-gray-700 font-semibold">封面图片链接</label>
            <input type="url" class="form-input" placeholder="可粘贴Unsplash图片链接">
            <label class="block mb-2 text-gray-700 font-semibold">正文内容</label>
            <textarea class="form-textarea" rows="8" placeholder="请输入正文内容" required></textarea>
            <button type="submit"
                class="ink-btn bg-blue-500 text-white px-6 py-2 rounded-xl font-semibold mt-2 w-full">发布文章</button>
        </form>
        <div id="success-tip" class="hidden mt-4 text-green-600 text-center">发布成功！（仅原型演示）</div>
    </div>
    <!-- 页脚 -->
    <footer class="mt-12 text-gray-400 text-xs">
        © 2024 个人 Blog · 水墨风格原型
    </footer>
</body>

</html>
