<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情 - 个人 Blog</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: url('./005GezDWgy1huhy5znorij33b04eob2e.jpg') no-repeat center center fixed;
            background-size: cover;
            /* 添加方正舒体字体和白色文字颜色 */
            font-family: "方正舒体", "STKaiti", "KaiTi", serif;
            color: #ffffff;
        }

        .ink-bg {
            background: rgba(255, 255, 255, 0.096);
            border-radius: 1.5rem;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            border: 1px solid #e5e7eb;
        }

        .ink-title {
            font-family: "方正舒体", "STKaiti", "KaiTi", serif; /* 更新标题字体 */
            letter-spacing: 0.1em;
            color: #ffffff; /* 将标题颜色改为白色 */
            text-shadow: 0 2px 8px #000000; /* 调整阴影以突出白色文字 */
        }

        .cover-img {
            border-radius: 1.2rem;
            object-fit: cover;
            width: 100%;
            height: 180px;
        }

        .fav-btn {
            transition: color 0.2s;
        }

        .fav-btn.active {
            color: #e11d48;
        }

        /* 覆盖 Tailwind 的文字颜色类，使其更亮 */
        .text-gray-500 {
            color: #dddddd !important;
        }

        .text-gray-700 {
            color: #cccccc !important;
        }
    </style>
    <script>
        function toggleFavorite(btn) {
            btn.classList.toggle('active');
            if (btn.classList.contains('active')) {
                btn.title = '已收藏';
            } else {
                btn.title = '收藏';
            }
        }
    </script>
</head>

<body class="min-h-screen flex flex-col items-center py-8">
    <!-- 顶部返回与标题 -->
    <div class="flex items-center w-full max-w-xl mb-6">
        <a href="articles.html" class="text-gray-500 hover:text-blue-500 mr-4"><i class="fa-solid fa-chevron-left"></i>
            返回</a>
        <h2 class="text-2xl font-bold ink-title flex-1 text-center">文章详情</h2>
        <span class="w-12"></span>
    </div>
    <!-- 文章内容区块 -->
    <div class="ink-bg w-full max-w-xl p-6">
        <img src="./005GezDWgy1huhy6f5zkvj33402c0u0x.jpg" alt="cover" class="cover-img mb-4">
        <div class="flex items-center mb-4">
            <div>
                <div class="text-sm font-semibold">小明</div>
                <div class="text-xs text-gray-500">2024-06-01</div>
            </div>
            <button class="ml-auto fav-btn" title="收藏" onclick="toggleFavorite(this)"><i
                    class="fa-solid fa-heart text-2xl"></i></button>
        </div>
        <h1 class="text-2xl font-bold ink-title mb-3">江南的清晨</h1>
        <div class="text-gray-700 leading-relaxed text-base">
            江南的清晨，薄雾缭绕，墨色渲染了整个小镇的静谧与温柔。沿着青石板路缓步前行，耳畔是潺潺的水声，心中却是无尽的安宁与诗意……
        </div>
    </div>
    <!-- 页脚 -->
    <footer class="mt-12 text-gray-400 text-xs">
        © 2024 个人 Blog
    </footer>
</body>

</html>
